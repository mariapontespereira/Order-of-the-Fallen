<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define o título que aparece no separador do navegador. -->
    <title>Order of the Fallen</title>

    <!-- Liga o ficheiro CSS externo responsável pelo estilo da página. -->
    <link rel="stylesheet" href="styles.css">
    <!-- Define o ícone da página que aparece no separador do navegador. -->
    <link rel="icon" type="image/png" href="favicon/favicon.png">
    
    <!-- Carrega a biblioteca Phaser, que é o motor usado para criar o jogo. -->
    <script src="libs/phaser.min.js"></script>
</head>
<body>
    <!-- Contentor onde o Phaser vai colocar o canvas do jogo. -->
    <div id="game-container"></div>
    
    <!-- Carrega o ficheiro principal do jogo como módulo JavaScript. -->
    <script type="module" src="game.js"></script>
</body>
</html>
